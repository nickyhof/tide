name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          version="${GITHUB_REF#refs/tags/}"
          ldflags="-s -w -X main.version=${version}"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )

          mkdir -p dist

          for target in "${targets[@]}"; do
            os=$(echo "$target" | cut -d' ' -f1)
            arch=$(echo "$target" | cut -d' ' -f2)
            output="tide-${version}-${os}-${arch}"

            echo "Building ${output}..."
            GOOS=$os GOARCH=$arch go build -ldflags "$ldflags" -o "dist/${output}/tide" ./cmd/tide

            tar -czf "dist/${output}.tar.gz" -C dist "${output}"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF#refs/tags/}"
          gh release create "$version" \
            --generate-notes \
            dist/*.tar.gz \
            dist/checksums.txt
